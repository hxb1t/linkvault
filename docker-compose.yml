services:
  redis:
    image: redis:8.6.2
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      - ENV_PATH=/configs/.env
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    depends_on:
      - redis

volumes:
  redis_data:
  db_data:
